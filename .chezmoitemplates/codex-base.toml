{{- if env "AZURE_OPENAI_ENDPOINT" }}
# 預設模型（Codex CLI 0.144+ 不支援 config.toml 內的 profile selector，
# 改用頂層設定；具名 profiles 在 codex.config.toml，以 --profile <name> 選用）
model_provider = "azure"
model = "gpt-5.3-codex"
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"
{{- end }}

# 可用選項："read-only" | "workspace-write" | "danger-full-access"
# workspace-write：僅允許寫入工作目錄，較安全的預設值
sandbox_mode = "workspace-write"
approval_policy = "on-request" # "untrusted" or "on-request" or "never"

{{- if env "AZURE_OPENAI_ENDPOINT" }}
[model_providers.azure]
name = "Azure"
base_url= "{{ env "AZURE_OPENAI_ENDPOINT" }}"
env_key = "OPENAI_API_KEY_app_mfv8vy68"

query_params = { api-version = "2025-04-01-preview" }
wire_api = "responses"
{{- end }}

[sandbox_workspace_write]
network_access = true

{{- if env "AZURE_OPENAI_ENDPOINT" }}
[shell_environment_policy]
# Codex CLI sandbox 預設會過濾名稱含 KEY/SECRET/TOKEN 的環境變數
# ignore_default_excludes = true 可停用此行為，確保 Azure API Key 能正常傳入
ignore_default_excludes = true
{{- end }}
