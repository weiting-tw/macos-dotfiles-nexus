profile="codex"

# 可用選項："read-only" | "workspace-write" | "danger-full-access"
# workspace-write：僅允許寫入工作目錄，較安全的預設值
sandbox_mode = "workspace-write"
approval_policy = "on-request" # "untrusted" or "on-request" or "never"

[profiles.codex]
model_provider = "azure"
model = "gpt-5.3-codex"
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"

[profiles.codex-max]
model_provider = "azure"
model = "gpt-5.1-codex-max"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"

[profiles.codex-mini]
model_provider = "azure"
model = "gpt-5.1-codex-mini"
model_reasoning_effort = "medium"
model_reasoning_summary = "concise"

[profiles."gpt-5.4"]
model_provider = "azure"
model = "gpt-5.4"
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"

[profiles."gpt-5.4-pro"]
model_provider = "azure"
model = "gpt-5.4-pro"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"

[profiles."gpt-5.4-mini"]
model_provider = "azure"
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"
model_reasoning_summary = "concise"

[profiles.o3]
model_provider = "azure"
model = "o3"
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"

[profiles.o3-pro]
model_provider = "azure"
model = "o3-pro"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"

[profiles.o4-mini]
model_provider = "azure"
model = "o4-mini"
model_reasoning_effort = "medium"
model_reasoning_summary = "concise"

{{- if env "AZURE_OPENAI_ENDPOINT" }}
[model_providers.azure]
name = "Azure"
base_url= "{{ env "AZURE_OPENAI_ENDPOINT" }}"
env_key = "OPENAI_API_KEY_app_mfv8vy68"

query_params = { api-version = "2025-04-01-preview" }
wire_api = "responses"
{{- end }}

[sandbox_workspace_write]
network_access = true

{{- if env "AZURE_OPENAI_ENDPOINT" }}
# Codex CLI sandbox 預設會過濾名稱含 KEY/SECRET/TOKEN 的環境變數
# ignore_default_excludes = true 可停用此行為，確保 Azure API Key 能正常傳入
[shell_environment_policy]
ignore_default_excludes = true
{{- end }}
